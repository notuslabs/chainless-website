  /* ── Base ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark-500: #1C1B19;

    --dark-800: #0F0E0D;
    --warm-300: #A4A097;
    --warm-400: #87837C;
    --warm-500: #6B6862;
    --warm-700: #3F3D3A;
    --yellow-500: #FFC73D;
    --yellow-400: #FFD486;
    --text-primary: #FAFAF8;
    --text-secondary: #B0ADA6;
  }

  body {
    background: var(--dark-500);
    color: var(--text-primary);
    font-family: system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── Progress bar ── */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--yellow-500);
    transition: width 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 100;
    opacity: 0.6;
  }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .header-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-400);
  }
  .header-counter {
    font-size: 13px;
    font-weight: 600;
    color: var(--warm-500);
    font-variant-numeric: tabular-nums;
  }

  /* ── Main area ── */
  .arena {
    flex: 1;
    display: flex;
    gap: 1px;
    position: relative;
  }

  /* ── Card (each side) ── */
  .card {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    cursor: pointer;
    position: relative;
    transition: background 0.3s ease;
  }
  .card:hover {
    background: rgba(255,255,255,0.02);
  }
  .card:active {
    background: rgba(255,199,61,0.03);
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid transparent;
    transition: border-color 0.2s ease;
    pointer-events: none;
  }
  .card:hover::after {
    border-color: rgba(255,199,61,0.1);
  }

  /* Divider between cards */
  .divider {
    width: 1px;
    background: rgba(255,255,255,0.06);
    align-self: stretch;
  }

  /* ── Labels ── */
  .card-label {
    position: absolute;
    top: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-500);
    opacity: 0.5;
  }
  .card:first-child .card-label { left: 24px; }
  .card:last-child .card-label { right: 24px; }

  /* ── Keyboard hints ── */
  .key-hint {
    position: absolute;
    bottom: 20px;
    font-size: 11px;
    color: var(--warm-500);
    opacity: 0.3;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card:first-child .key-hint { left: 24px; }
  .card:last-child .key-hint { right: 24px; }
  .key-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
  }

  /* ── Content container ── */
  .content {
    max-width: 480px;
    width: 100%;
  }

  /* ── Context label ── */
  .context-label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-500);
    opacity: 0.4;
    white-space: nowrap;
  }

  /* ── Animation ── */
  .arena {
    opacity: 1;
    transition: opacity 0.25s ease;
  }
  .arena.transitioning {
    opacity: 0;
  }

  /* ── Flash feedback ── */
  .flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .card.chosen .flash {
    opacity: 1;
    background: rgba(255,199,61,0.04);
  }

  /* ── Results screen ── */
  .results {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    padding: 48px;
    text-align: center;
    gap: 32px;

  }
  .results h2 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-400);
  }
  .result-bar-container {
    width: 100%;
    max-width: 500px;
  }
  .result-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 15px;
    font-weight: 500;
  }
  .result-bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .result-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.5s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .result-fill.geist { background: var(--text-secondary); }
  .result-fill.switzer { background: var(--yellow-500); }
  .result-verdict {
    font-size: 18px;
    line-height: 1.6;
    color: var(--text-secondary);
    max-width: 440px;
  }
  .result-verdict strong {
    color: var(--yellow-500);
    font-weight: 600;
  }
  .result-breakdown {
    margin-top: 16px;
    font-size: 13px;
    color: var(--warm-500);
    line-height: 1.8;
  }
  .restart-btn {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .restart-btn:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.15);
  }
</style>
</head>

    context: 'Large numeral · 36px · medium',
    html: `<div style="display:flex;align-items:end;gap:12px;border-top:1px solid rgba(63,61,58,0.15);padding-top:32px">
      <span style="font-size:36px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;color:#FAFAF8">R$40B+</span>
      <span style="font-size:14px;line-height:1.4;color:rgba(135,131,124,0.5);margin-bottom:4px">presos em custodiantes após FTX</span>
    </div>`
  },
  {
    context: 'Yield metric · 18px semibold',
    html: `<div style="display:flex;flex-direction:column;gap:2px">
      <span style="font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(250,250,248,0.75)">18.2%</span>
      <span style="font-size:9px;color:rgba(135,131,124,0.4)">12–25%</span>
    </div>`
  }
];

// State
let currentRound = 0;
let scores = { geist: 0, switzer: 0 };
let categoryScores = {};
let order = []; // which font is on which side per round
let shuffledRounds = [];
let transitioning = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  shuffledRounds = shuffle(rounds);
  // Randomize which side each font appears on per round
  order = shuffledRounds.map(() => Math.random() < 0.5 ? 'left' : 'right');
  currentRound = 0;
  scores = { geist: 0, switzer: 0 };
  categoryScores = {};
  document.getElementById('results').classList.remove('visible');
  document.getElementById('header').style.display = 'flex';
  document.getElementById('arena').style.display = 'flex';
  document.getElementById('context').style.display = 'block';
  render();
}

function render() {
  const round = shuffledRounds[currentRound];
  const geistSide = order[currentRound]; // 'left' or 'right'
  const switzerSide = geistSide === 'left' ? 'right' : 'left';

  document.getElementById(`content-${geistSide}`).innerHTML = round.html;
  document.getElementById(`content-${geistSide}`).style.fontFamily = `'${FONT_A}', system-ui, sans-serif`;

  document.getElementById(`content-${switzerSide}`).innerHTML = round.html;
  document.getElementById(`content-${switzerSide}`).style.fontFamily = `'${FONT_B}', system-ui, sans-serif`;

  document.getElementById('counter').textContent = `${currentRound + 1} / ${shuffledRounds.length}`;
  document.getElementById('progress').style.width = `${((currentRound) / shuffledRounds.length) * 100}%`;
  document.getElementById('context').textContent = round.context;
}

function choose(side) {
  if (transitioning) return;
  transitioning = true;

  const round = shuffledRounds[currentRound];
  const geistSide = order[currentRound];
  const chosenFont = side === geistSide ? 'geist' : 'switzer';
  scores[chosenFont]++;

  // Track per-category
  const cat = round.context.split('·')[0].trim();
  if (!categoryScores[cat]) categoryScores[cat] = { geist: 0, switzer: 0 };
  categoryScores[cat][chosenFont]++;

  // Flash feedback
  const card = document.getElementById(`card-${side}`);
  card.classList.add('chosen');

  setTimeout(() => {
    card.classList.remove('chosen');
    currentRound++;

    if (currentRound >= shuffledRounds.length) {
      showResults();
      transitioning = false;
      return;
    }

    const arena = document.getElementById('arena');
    arena.classList.add('transitioning');

    setTimeout(() => {
      render();
      arena.classList.remove('transitioning');
      transitioning = false;
    }, 250);
  }, 200);
}

function showResults() {
  const total = scores.geist + scores.switzer;
  const geistPct = Math.round((scores.geist / total) * 100);
  const switzerPct = 100 - geistPct;

  document.getElementById('header').style.display = 'none';
  document.getElementById('arena').style.display = 'none';
  document.getElementById('context').style.display = 'none';
  document.getElementById('progress').style.width = '100%';

  document.getElementById('label-a').textContent = `Geist — ${scores.geist} picks`;
  document.getElementById('label-b').textContent = `Switzer — ${scores.switzer} picks`;
  document.getElementById('score-a').textContent = `${geistPct}%`;
  document.getElementById('score-b').textContent = `${switzerPct}%`;

  const results = document.getElementById('results');
  results.classList.add('visible');

  setTimeout(() => {
    document.getElementById('fill-a').style.width = `${geistPct}%`;
    document.getElementById('fill-b').style.width = `${switzerPct}%`;
  }, 100);

  // Verdict
  const winner = geistPct > switzerPct ? 'Geist' : switzerPct > geistPct ? 'Switzer' : null;
  const margin = Math.abs(geistPct - switzerPct);
  let verdictText;
  if (!winner) {
    verdictText = `Dead even. Both fonts performed identically across all contexts. The difference between them may not matter for your brand.`;
  } else if (margin <= 12) {
    verdictText = `Slight preference for <strong>${winner}</strong>, but within noise range. You're split — either font works. Pick based on principle, not gut.`;
  } else if (margin <= 30) {
    verdictText = `Clear preference for <strong>${winner}</strong>. Your eye consistently chose it across multiple contexts. That's signal.`;
  } else {
    verdictText = `Strong preference for <strong>${winner}</strong>. The difference was obvious to you even without knowing which was which.`;
  }
  document.getElementById('verdict').innerHTML = verdictText;

  // Category breakdown
  let breakdownHTML = '';
  for (const [cat, s] of Object.entries(categoryScores)) {
    const catTotal = s.geist + s.switzer;
    if (catTotal === 1) {
      const w = s.geist > s.switzer ? 'Geist' : 'Switzer';
      breakdownHTML += `${cat}: ${w}<br>`;
    }
  }
  // Group wins by font
  let geistWins = [], switzerWins = [];
  for (const [cat, s] of Object.entries(categoryScores)) {
    if (s.geist > s.switzer) geistWins.push(cat);
    else if (s.switzer > s.geist) switzerWins.push(cat);
  }
  let bd = '';
  if (geistWins.length) bd += `Geist won: ${geistWins.join(', ')}<br>`;
  if (switzerWins.length) bd += `Switzer won: ${switzerWins.join(', ')}`;
  document.getElementById('breakdown').innerHTML = bd;
}

function restart() {
  init();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') choose('left');
  if (e.key === 'ArrowRight') choose('right');
});

// Wait for fonts to load then init
document.fonts.ready.then(() => {
  setTimeout(init, 200);
});
</script>

</body>
</html>
